<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="gMid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="gRoute" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="gState" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#7e22ce"/>
    </linearGradient>
    <linearGradient id="gPool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="gFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="gJob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="gCompose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="gOutput" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="gPrint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>

    <!-- Arrowheads -->
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrPoll" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ec4899"/>
    </marker>
    <marker id="arrPrint" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6366f1"/>
    </marker>

    <!-- Subtle glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Reusable component box -->
    <symbol id="box" overflow="visible">
      <rect rx="14" ry="14" width="220" height="76" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    </symbol>

  </defs>

  <!-- Background -->
  <rect width="1200" height="920" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200 M0 600 H1200 M0 700 H1200 M0 800 H1200"/>
    <path d="M100 0 V920 M200 0 V920 M300 0 V920 M400 0 V920 M500 0 V920 M600 0 V920 M700 0 V920 M800 0 V920 M900 0 V920 M1000 0 V920 M1100 0 V920"/>
  </g>

  <!-- Title -->
  <g fill="#e2e8f0" text-anchor="middle">
    <text x="600" y="44" font-size="26" font-weight="700">Tour Allianz Parque — Photo Manager</text>
    <text x="600" y="68" font-size="14" fill="#94a3b8">Arquitetura: FastAPI + reconhecimento facial local + scan assíncrono</text>
  </g>

  <!-- Lane labels -->
  <g fill="#475569" font-size="11" font-weight="600" letter-spacing="2">
    <text x="50" y="148" transform="rotate(-90 50 148)">CLIENTE</text>
    <text x="50" y="370" transform="rotate(-90 50 370)">FASTAPI</text>
    <text x="50" y="612" transform="rotate(-90 50 612)">WORKERS</text>
    <text x="50" y="830" transform="rotate(-90 50 830)">SAÍDA</text>
  </g>

  <!-- ========== CLIENT LANE ========== -->
  <!-- Visitante -->
  <g transform="translate(100,110)">
    <use href="#box" fill="url(#gFront)" filter="url(#glow)"/>
    <text x="110" y="32" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">👤 Visitante / Operador</text>
    <text x="110" y="55" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">webcam · upload · escolha de fotos</text>
  </g>

  <!-- Browser SPA -->
  <g transform="translate(490,110)">
    <use href="#box" fill="url(#gFront)"/>
    <text x="110" y="32" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">🖥️ SPA — index.html · app.js</text>
    <text x="110" y="55" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">stepper · fetch · polling 500 ms</text>
  </g>

  <!-- Cookie sticker -->
  <g transform="translate(880,124)">
    <rect rx="12" ry="12" width="180" height="48" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
    <text x="90" y="22" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">🍪 Cookie HTTP</text>
    <text x="90" y="38" text-anchor="middle" fill="#cbd5e1" font-size="10">app_session_id · HttpOnly · Lax</text>
  </g>

  <!-- Visitante → SPA -->
  <line x1="320" y1="148" x2="490" y2="148" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="405" y="140" text-anchor="middle" fill="#94a3b8" font-size="11">interage</text>

  <!-- ========== FASTAPI LANE ========== -->
  <!-- Middleware -->
  <g transform="translate(490,260)">
    <use href="#box" fill="url(#gMid)" filter="url(#glow)"/>
    <text x="110" y="32" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">⚙️ Middleware</text>
    <text x="110" y="55" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">request_id · cookie sessão</text>
  </g>

  <!-- Routes -->
  <g transform="translate(490,395)">
    <use href="#box" fill="url(#gRoute)"/>
    <text x="110" y="30" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">🛣️ Rotas FastAPI</text>
    <text x="110" y="48" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">/face/capture · /scan · /compose · /print</text>
    <text x="110" y="62" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Pydantic · validação · path traversal guard</text>
  </g>

  <!-- Per-session state -->
  <g transform="translate(880,395)">
    <use href="#box" fill="url(#gState)"/>
    <text x="110" y="28" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">🗂️ sessions[sid]</text>
    <text x="110" y="46" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">session_path</text>
    <text x="110" y="58" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">reference_encodings · match_results</text>
  </g>

  <!-- SPA → Middleware (animated dash) -->
  <line x1="600" y1="186" x2="600" y2="260" stroke="#10b981" stroke-width="3" marker-end="url(#arr)" stroke-dasharray="6 6">
    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <text x="615" y="226" fill="#94a3b8" font-size="11">HTTP</text>

  <!-- Cookie sticker → middleware (curved) -->
  <path d="M 970 172 C 970 220 760 220 700 260" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.6"/>

  <!-- Middleware → Routes -->
  <line x1="600" y1="336" x2="600" y2="395" stroke="#22c55e" stroke-width="3" marker-end="url(#arr)" stroke-dasharray="6 6">
    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="0.8s" repeatCount="indefinite"/>
  </line>

  <!-- Routes → State (read/write, bidirectional dashed) -->
  <line x1="710" y1="430" x2="880" y2="430" stroke="#a855f7" stroke-width="2.5" marker-end="url(#arr)" stroke-dasharray="6 6">
    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <line x1="880" y1="450" x2="710" y2="450" stroke="#a855f7" stroke-width="2.5" marker-end="url(#arr)" stroke-dasharray="6 6">
    <animate attributeName="stroke-dashoffset" from="0" to="24" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <text x="795" y="425" text-anchor="middle" fill="#c4b5fd" font-size="10">read/write</text>

  <!-- ========== WORKER LANE ========== -->
  <!-- ThreadPoolExecutor -->
  <g transform="translate(490,540)">
    <use href="#box" fill="url(#gPool)" filter="url(#glow)"/>
    <text x="110" y="28" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">ThreadPoolExecutor</text>
    <text x="110" y="48" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">max_workers = 2</text>
  </g>

  <!-- face_recognition -->
  <g transform="translate(880,540)">
    <use href="#box" fill="url(#gFace)"/>
    <text x="110" y="28" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">face_recognition</text>
    <text x="110" y="46" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">HOG + encodings</text>
    <text x="110" y="60" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="10">CLAHE fallback · upsample 2×</text>
  </g>

  <!-- scan_jobs -->
  <g transform="translate(110,540)">
    <use href="#box" fill="url(#gJob)"/>
    <text x="110" y="28" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">📋 scan_jobs[id]</text>
    <text x="110" y="46" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">status · progress · total · matches</text>
    <text x="110" y="60" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="10">TTL 10 min</text>
  </g>

  <!-- Routes → ThreadPool: submit -->
  <line x1="600" y1="471" x2="600" y2="540" stroke="#f59e0b" stroke-width="3" marker-end="url(#arr)" stroke-dasharray="6 6">
    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1s" repeatCount="indefinite"/>
  </line>
  <text x="615" y="510" fill="#fcd34d" font-size="11" font-weight="600">submit job</text>

  <!-- ThreadPool → face_recognition -->
  <line x1="710" y1="578" x2="880" y2="578" stroke="#ef4444" stroke-width="3" marker-end="url(#arr)" stroke-dasharray="6 6">
    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="0.7s" repeatCount="indefinite"/>
  </line>
  <text x="795" y="572" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">scan</text>

  <!-- face_recognition → ThreadPool (results back) -->
  <line x1="880" y1="600" x2="710" y2="600" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.7"/>
  <text x="795" y="615" text-anchor="middle" fill="#94a3b8" font-size="9">matches</text>

  <!-- ThreadPool → scan_jobs (progress) -->
  <line x1="490" y1="578" x2="330" y2="578" stroke="#ec4899" stroke-width="2.5" marker-end="url(#arr)" stroke-dasharray="6 6">
    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1s" repeatCount="indefinite"/>
  </line>
  <text x="410" y="572" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="600">progress callback</text>

  <!-- Polling loop: SPA ↔ scan_jobs (curved circle on the left) -->
  <path d="M 220 540 C 220 320 380 280 490 320" fill="none" stroke="#ec4899" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrPoll)">
    <animate attributeName="stroke-dashoffset" from="0" to="-48" dur="1.4s" repeatCount="indefinite"/>
  </path>
  <text x="245" y="395" fill="#f9a8d4" font-size="11" font-weight="700">poll 500 ms</text>
  <text x="245" y="410" fill="#94a3b8" font-size="9">GET /api/scan/{id}</text>

  <!-- Particles flowing (small circles animateMotion) -->
  <circle r="4" fill="#fde68a">
    <animateMotion dur="2.6s" repeatCount="indefinite" path="M 600 186 V 260 V 336 V 395 V 471 V 540"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#fca5a5">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M 710 578 H 880"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#f9a8d4">
    <animateMotion dur="2s" repeatCount="indefinite" path="M 490 578 H 330"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- ========== OUTPUT LANE ========== -->
  <!-- composition_service -->
  <g transform="translate(310,760)">
    <use href="#box" fill="url(#gCompose)"/>
    <text x="110" y="28" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">🖼️ composition_service</text>
    <text x="110" y="48" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">recorte ao redor do rosto</text>
    <text x="110" y="62" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">+ template_allianz.jpg</text>
  </g>

  <!-- output dir -->
  <g transform="translate(640,760)">
    <use href="#box" fill="url(#gOutput)"/>
    <text x="110" y="28" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">📁 output/</text>
    <text x="110" y="48" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">JPGs prontos para impressão</text>
    <text x="110" y="62" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="10">cleanup TTL 7 dias</text>
  </g>

  <!-- Printer -->
  <g transform="translate(960,760)">
    <use href="#box" fill="url(#gPrint)" filter="url(#glow)"/>
    <text x="110" y="28" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">🖨️ Impressora</text>
    <text x="110" y="48" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">os.startfile(path, "print")</text>
    <text x="110" y="62" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="10">15×20 cm @ 300 DPI</text>
  </g>

  <!-- Routes → composition (curved down-left) -->
  <path d="M 540 471 C 480 600 440 700 460 760" fill="none" stroke="#14b8a6" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arr)">
    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <text x="430" y="640" fill="#5eead4" font-size="10" font-weight="600">POST /api/compose</text>

  <!-- composition → output -->
  <line x1="530" y1="798" x2="640" y2="798" stroke="#06b6d4" stroke-width="2.5" marker-end="url(#arr)" stroke-dasharray="6 6">
    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="0.9s" repeatCount="indefinite"/>
  </line>

  <!-- output → printer -->
  <line x1="860" y1="798" x2="960" y2="798" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrPrint)" stroke-dasharray="6 6">
    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="0.9s" repeatCount="indefinite"/>
  </line>
  <text x="910" y="788" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">/api/print</text>

  <!-- Particles output flow -->
  <circle r="4" fill="#5eead4">
    <animateMotion dur="2.2s" repeatCount="indefinite" path="M 540 471 C 480 600 440 700 460 760"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#67e8f9">
    <animateMotion dur="1.4s" repeatCount="indefinite" path="M 530 798 H 640"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#a5b4fc">
    <animateMotion dur="1.4s" repeatCount="indefinite" path="M 860 798 H 960"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Pulsing badges on critical components -->
  <g>
    <circle cx="600" cy="298" r="18" fill="none" stroke="#10b981" stroke-width="2" opacity="0.9">
      <animate attributeName="r" values="18;30;18" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g>
    <circle cx="600" cy="578" r="20" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.9">
      <animate attributeName="r" values="20;36;20" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Legend -->
  <g transform="translate(880,860)">
    <rect width="280" height="48" rx="8" fill="rgba(15,23,42,0.7)" stroke="rgba(255,255,255,0.12)"/>
    <g font-size="10" fill="#cbd5e1">
      <circle cx="14" cy="16" r="4" fill="#fde68a"/><text x="24" y="20">request</text>
      <circle cx="84" cy="16" r="4" fill="#f9a8d4"/><text x="94" y="20">progress</text>
      <circle cx="160" cy="16" r="4" fill="#5eead4"/><text x="170" y="20">compose</text>
      <circle cx="236" cy="16" r="4" fill="#a5b4fc"/><text x="246" y="20">print</text>
      <text x="14" y="38" fill="#94a3b8">Animações SMIL — abra em qualquer navegador moderno.</text>
    </g>
  </g>
</svg>
